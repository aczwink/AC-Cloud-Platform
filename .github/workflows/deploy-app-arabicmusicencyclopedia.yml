name: Deploy app - ArabicMusicEncyclopedia

on:
  push:
    paths:
      - .github/workflows/deploy-app-arabicmusicencyclopedia.yml
  workflow_run:
    workflows: ["Deploy infrastructure"]
    types:
      - completed
    branches:
      - main
      - dev

jobs:
  deploy:
    env:
      envAbbrev: ${{ github.ref_name == 'main' && 'prd' || 'dev' }}
      envPrefix: ${{ github.ref_name == 'main' && '' || 'dev' }}

    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}

    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    
    permissions:
      id-token: write

    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com/
          
      - name: Checkout OpenArabicMusicDB repo
        uses: actions/checkout@v4
        with:
            repository: aczwink/OpenArabicMusicDB
            path: openarabicmusicdb

      - env:
          NODE_AUTH_TOKEN: ${{secrets.GITHUB_TOKEN}}
        name: Build OpenArabicMusicDB builder
        run: |
          npm ci
        working-directory: ./openarabicmusicdb/builder

      - name: Checkout ArabicMusicEncyclopedia repo
        uses: actions/checkout@v4
        with:
            repository: aczwink/ArabicMusicEncyclopedia
            path: arabicmusicencyclopedia

      - name: Build ArabicMusicEncyclopedia backend
        run: |
          npm ci
          npm run build-release-package
        working-directory: ./arabicmusicencyclopedia/backend