name: Deploy ACKungFuDoc app

on:
  workflow_run:
    workflows: ["Deploy infrastructure"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout ACKungFuDoc repo
        uses: actions/checkout@v4
        with:
            repository: aczwink/KungFuWiki
            path: ackungfudoc