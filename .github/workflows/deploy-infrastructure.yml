name: Deploy infrastructure

on:
  push:
    branches:
      - main
      - dev
    paths:
      - .github/workflows/deploy-infrastructure.yml
      - environments/**
      - modules/**
  schedule:
    - cron: 0 3 * * 1

jobs:
  deploy:
    env:
      envAbbrev: ${{ github.ref_name == 'main' && 'prd' || 'dev' }}
      RG_NAME: ${{ github.ref_name == 'main' && 'prd-rg-terraform-state' || 'dev-rg-terraform-state' }}
      LOCATION: ${{ github.ref_name == 'main' && 'westeurope' || 'eastus2' }}
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}

    permissions:
      id-token: write

    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Resource Group exists
        run: |
          az group create --name $RG_NAME --location $LOCATION

      - name: Deploy Bicep
        run: |
          az deployment group create --resource-group $RG_NAME --template-file ./setup/terraform-state/storage-account.bicep --parameters environmentAbbreviation=${envAbbrev}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      
      - name: Terraform Init
        run: terraform init -input=false
        working-directory: ./environments/${envAbbrev}

      - name: Terraform Validate
        run: terraform validate
        working-directory: ./environments/${envAbbrev}

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false
        working-directory: ./environments/${envAbbrev}